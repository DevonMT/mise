name: Deploy PWA to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - run: npm ci
      # Personal edition (AI on, points at the mini) -> /mise/
      - run: npm run build
        env:
          BASE_PATH: /mise/
          # Set repo variable VITE_PARSE_URL to the mini's HTTPS endpoint to
          # make AI capture live. Until then, capture errors gracefully.
          VITE_PARSE_URL: ${{ vars.VITE_PARSE_URL }}
      # Lite edition (public, no AI, no backend) -> /mise/lite/
      - run: npx vite build --outDir dist/lite --emptyOutDir false
        env:
          BASE_PATH: /mise/lite/
          VITE_MISE_EDITION: lite
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
